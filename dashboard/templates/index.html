<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirQuality Jatim</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>AirQuality Jatim</h1>
        <div class="last-updated">
            <div class="status-dot"></div>
            <span id="update-time">Memuat...</span>
        </div>
    </header>

    <div class="summary-cards">
        <div class="stat-card-new">
            <div class="stat-title">Rata-rata AQI</div>
            <div class="stat-value-large" id="stat-avg-aqi">--</div>
        </div>
        <div class="stat-card-new">
            <div class="stat-title">Kota Terburuk</div>
            <div class="stat-value-large" id="stat-worst-city">--</div>
        </div>
        <div class="stat-card-new">
            <div class="stat-title">Status</div>
            <div class="stat-value-large" id="stat-system-status">--</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel col-span-12" style="padding: 0; overflow: hidden;">
            <div id="map"></div>
        </div>

        <div class="panel col-span-8">
            <h2 class="panel-title">Data Kualitas Udara Real-time</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Kota</th>
                            <th>AQI</th>
                            <th>Kategori</th>
                            <th>Waktu</th>
                        </tr>
                    </thead>
                    <tbody id="live-api-body"></tbody>
                </table>
            </div>
        </div>

        <div class="panel col-span-4">
            <h2 class="panel-title">Berita Lingkungan</h2>
            <div class="news-list" id="live-rss-body"></div>
        </div>

        <div class="panel col-span-12">
            <h2 class="panel-title">Analisis Apache Spark</h2>
            <div class="dashboard-grid" style="margin-top: 0.5rem;">
                <div class="panel col-span-6" style="background: var(--bg-color); border: 1px solid var(--border-color);">
                    <h3>Ranking Kota (AQI Tertinggi)</h3>
                    <div class="chart-container">
                        <canvas id="rankingChart"></canvas>
                    </div>
                </div>
                <div class="panel col-span-6" style="background: var(--bg-color); border: 1px solid var(--border-color);">
                    <h3>Distribusi Kategori per Kota</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Kota</th>
                                <th style="width: 50%;">Distribusi</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="spark-dist-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const cityCoordinates = {
            'Surabaya': [-7.250445, 112.768845],
            'Malang': [-7.983908, 112.621391],
            'Sidoarjo': [-7.4478, 112.7183],
            'Gresik': [-7.1555, 112.6555],
            'Mojokerto': [-7.4726, 112.4337],
            'Banyuwangi': [-8.2192, 114.3692],
            'Lumajang': [-8.1333, 113.2228],
            'Jombang': [-7.5459, 112.2331],
            'Bojonegoro': [-7.1500, 111.8833],
            'Madiun': [-7.6298, 111.5239],
            'Pasuruan': [-7.6453, 112.9075],
            'Probolinggo': [-7.7569, 113.2115]
        };

        const idMonthMap = {
            'Januari': '01', 'Februari': '02', 'Maret': '03', 'April': '04',
            'Mei': '05', 'Juni': '06', 'Juli': '07', 'Agustus': '08',
            'September': '09', 'Oktober': '10', 'November': '11', 'Desember': '12'
        };

        let map, markersLayer, rankingChart;

        function parseIdDate(str) {
            if (!str) return null;
            const months = idMonthMap;
            const m = str.match(/(\d{1,2})-(\w+)-(\d{4})\s+(\d{2}:\d{2}:\d{2})/);
            if (m) {
                const mon = months[m[2]] || '01';
                return new Date(`${m[3]}-${mon}-${m[1].padStart(2,'0')}T${m[4]}`);
            }
            return null;
        }

        function formatTimeAgo(date) {
            if (!date || isNaN(date.getTime())) return '--';
            const now = new Date();
            const diffMs = now - date;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'Baru saja';
            if (diffMin < 60) return `${diffMin} menit lalu`;
            const diffHr = Math.floor(diffMin / 60);
            if (diffHr < 24) return `${diffHr} jam lalu`;
            return `${Math.floor(diffHr / 24)} hari lalu`;
        }

        function toNum(val) {
            const n = parseFloat(val);
            return isNaN(n) ? 0 : n;
        }

        function initMap() {
            map = L.map('map').setView([-7.7, 112.7], 8);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        function getAqiColor(aqi) {
            if (aqi <= 50) return '#22c55e';
            if (aqi <= 100) return '#eab308';
            if (aqi <= 150) return '#ef4444';
            return '#991b1b';
        }

        function updateMapMarkers(apiData) {
            markersLayer.clearLayers();
            apiData.forEach(item => {
                const coords = cityCoordinates[item.city];
                if (!coords) return;
                const aqi = toNum(item.aqi);
                const color = getAqiColor(aqi);
                const icon = L.divIcon({
                    className: '',
                    html: `<div style="background:${color}; width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>`,
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });
                const marker = L.marker(coords, { icon });
                marker.bindPopup(
                    `<strong>${item.city}</strong><br>AQI: <strong style="color:${color}">${aqi}</strong><br>${item.category || ''}`
                );
                markersLayer.addLayer(marker);
            });
        }

        function initChart() {
            const ctx = document.getElementById('rankingChart').getContext('2d');
            Chart.defaults.color = '#71717a';
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.font.size = 11;

            rankingChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Rata-rata AQI',
                        data: [],
                        backgroundColor: [],
                        borderRadius: 3,
                        barThickness: 20,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: { font: { size: 10 } }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { font: { size: 11 } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateChart(worstCitiesData) {
            worstCitiesData.sort((a, b) => b.avg_aqi - a.avg_aqi);
            const top = worstCitiesData.slice(0, 8);
            rankingChart.data.labels = top.map(i => i.city);
            rankingChart.data.datasets[0].data = top.map(i => toNum(i.avg_aqi));
            rankingChart.data.datasets[0].backgroundColor = top.map(i => getAqiColor(toNum(i.avg_aqi)));
            rankingChart.update();
        }

        function getBadgeClass(category) {
            if (!category) return 'badge-moderate';
            const c = category.toLowerCase();
            if (c.includes('baik')) return 'badge-good';
            if (c.includes('sedang')) return 'badge-moderate';
            if (c.includes('tidak sehat')) return 'badge-unhealthy';
            if (c.includes('berbahaya')) return 'badge-hazardous';
            return 'badge-moderate';
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                document.getElementById('update-time').textContent =
                    'Diperbarui: ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                if (data.live_api && data.live_api.length > 0) {
                    let totalAqi = 0;
                    let worstCity = '--';
                    let maxAqi = -1;

                    data.live_api.forEach(item => {
                        const aqi = toNum(item.aqi);
                        totalAqi += aqi;
                        if (aqi > maxAqi) { maxAqi = aqi; worstCity = item.city; }
                    });

                    const avgAqi = (totalAqi / data.live_api.length).toFixed(1);
                    document.getElementById('stat-avg-aqi').textContent = avgAqi;
                    document.getElementById('stat-avg-aqi').style.color = getAqiColor(parseFloat(avgAqi));
                    document.getElementById('stat-worst-city').textContent = worstCity;
                    document.getElementById('stat-worst-city').style.color = getAqiColor(maxAqi);

                    const hasAlert = data.live_api.some(item => toNum(item.aqi) > 100);
                    const statusEl = document.getElementById('stat-system-status');
                    statusEl.textContent = hasAlert ? 'WASPADA' : 'AMAN';
                    statusEl.style.color = hasAlert ? 'var(--aqi-unhealthy)' : 'var(--aqi-good)';

                    try { updateMapMarkers(data.live_api); } catch(e) { console.warn('Map update:', e); }

                    const apiBody = document.getElementById('live-api-body');
                    apiBody.innerHTML = '';
                    data.live_api.forEach(item => {
                        const aqi = toNum(item.aqi);
                        const tr = document.createElement('tr');
                        const date = parseIdDate(item.timestamp);
                        tr.innerHTML = `
                            <td style="font-weight:500">${item.city}</td>
                            <td style="font-weight:600; color:${getAqiColor(aqi)}">${aqi}</td>
                            <td><span class="badge ${getBadgeClass(item.category)}">${item.category || '--'}</span></td>
                            <td style="color:var(--text-secondary);font-size:0.8rem">${formatTimeAgo(date)}</td>
                        `;
                        apiBody.appendChild(tr);
                    });
                }

                const rssBody = document.getElementById('live-rss-body');
                rssBody.innerHTML = '';
                if (data.live_rss && data.live_rss.length > 0) {
                    data.live_rss.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        div.innerHTML = `
                            <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                            <div class="news-meta">${item.published || ''}</div>
                            ${item.summary ? `<div class="news-summary">${item.summary.substring(0, 120)}...</div>` : ''}
                        `;
                        rssBody.appendChild(div);
                    });
                }

                if (data.spark_results) {
                    if (data.spark_results.worst_cities) try { updateChart(data.spark_results.worst_cities); } catch(e) { console.warn('Chart update:', e); }

                    const distBody = document.getElementById('spark-dist-body');
                    distBody.innerHTML = '';
                    if (data.spark_results.aqi_distribution) {
                        data.spark_results.aqi_distribution.slice(0, 8).forEach(item => {
                            const total = item.baik + item.sedang + item.tidak_sehat + item.berbahaya;
                            if (total <= 0) return;
                            const pB = (item.baik / total) * 100;
                            const pS = (item.sedang / total) * 100;
                            const pT = (item.tidak_sehat / total) * 100;
                            const pX = (item.berbahaya / total) * 100;
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td style="font-weight:500">${item.city}</td>
                                <td>
                                    <div class="progress-bar-container">
                                        <div class="progress-segment" style="width:${pB}%;background:var(--aqi-good)" title="Baik: ${item.baik}"></div>
                                        <div class="progress-segment" style="width:${pS}%;background:var(--aqi-moderate)" title="Sedang: ${item.sedang}"></div>
                                        <div class="progress-segment" style="width:${pT}%;background:var(--aqi-unhealthy)" title="Tidak Sehat: ${item.tidak_sehat}"></div>
                                        <div class="progress-segment" style="width:${pX}%;background:var(--aqi-hazardous)" title="Berbahaya: ${item.berbahaya}"></div>
                                    </div>
                                </td>
                                <td style="color:var(--text-secondary);font-size:0.8rem">${total}</td>
                            `;
                            distBody.appendChild(tr);
                        });
                    }
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        (function() {
            try { initMap(); } catch(e) { console.warn('Map init:', e); }
            try { initChart(); } catch(e) { console.warn('Chart init:', e); }
            fetchData();
            setInterval(fetchData, 30000);
        })();
    </script>
</body>
</html>
